<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIWI - Test de Conexión</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .loading { background: #fff3cd; border-color: #ffeaa7; }
    </style>
</head>
<body>
    <h1>🔍 Test de Conexión RIWI API</h1>
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const results = document.getElementById('results');

        async function testEndpoint(name, endpoint) {
            const div = document.createElement('div');
            div.className = 'test loading';
            div.innerHTML = `<strong>${name}:</strong> Probando...`;
            results.appendChild(div);

            try {
                const response = await fetch(`${API_BASE}/${endpoint}`);
                const data = await response.json();
                
                div.className = 'test success';
                div.innerHTML = `
                    <strong>${name}:</strong> ✅ Funciona (${response.status})<br>
                    <small>Registros: ${Array.isArray(data) ? data.length : 1}</small>
                `;
            } catch (error) {
                div.className = 'test error';
                div.innerHTML = `
                    <strong>${name}:</strong> ❌ Error<br>
                    <small>${error.message}</small>
                `;
            }
        }

        // Probar todos los endpoints
        async function runTests() {
            await testEndpoint('Campus', 'campus');
            await testEndpoint('Cohorts', 'cohorts');
            await testEndpoint('Clans', 'clans');
            await testEndpoint('Coders', 'coders');
            await testEndpoint('Specialists', 'specialists');
        }

        runTests();
    </script>
</body>
</html>
